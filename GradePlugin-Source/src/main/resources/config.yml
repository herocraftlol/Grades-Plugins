# =========================================================
#  GradePlugin - configuration
#  A dupliquer sur CHAQUE serveur Paper derriere le BungeeCord
#  (les serveurs partagent la meme base de donnees)
# =========================================================

mysql:
  # Une seule base MySQL partagee entre TOUS tes serveurs Paper (survie,
  # skyblock...) ET ton site web. Comme MySQL est un vrai serveur reseau
  # (contrairement a SQLite qui n'etait qu'un fichier), tes serveurs
  # Minecraft n'ont PLUS besoin d'etre sur la meme machine : renseigne
  # juste la meme adresse/les memes identifiants partout.
  host: "127.0.0.1"
  port: 3306
  database: "grades_db"
  user: "grades_user"
  password: "CHANGE_ME"
  pool-size: 6
  useSSL: false

# Intervalle (en secondes) auquel le plugin verifie les nouvelles
# attributions de grades faites depuis le site web (table pending_sync)
sync-interval-seconds: 10

# Intervalle (en secondes) auquel le plugin verifie les grades expires
expiration-check-interval-seconds: 60

# Active le formatage automatique du chat (prefixe/suffixe/couleur du grade)
# Mettre a false si tu utilises deja un autre plugin de chat (EssentialsChat, etc.)
handle-chat-format: true
chat-format: "%prefix%%player%%suffix% &7: &f%message%"

# Active le renommage du joueur dans le tab-list avec le prefixe du grade
handle-tablist: true

# Enregistre chaque connexion/deconnexion/kill/mort dans la table MySQL
# "players", utilisee par le site web pour afficher skin/pseudo/stats de
# tous les joueurs deja venus (section "Joueurs" du site).
track-players: true

# Nom de CE serveur dans le reseau (a changer sur CHAQUE serveur derriere
# le BungeeCord : "survie-1", "creatif", "lobby", etc.). Sert uniquement a
# l'affichage sur le site ("vu sur : survie-1").
server-name: "survie-1"

# Grades par defaut, crees automatiquement en base au premier demarrage
# si la table "grades" est vide. Tu peux ensuite tout gerer via
# /gradeadmin create ou directement en base / depuis ton site.
default-grades:
  vip:
    display-name: "VIP"
    prefix: "&a[VIP] &f"
    suffix: ""
    color: "&a"
    priority: 1
    permissions:
      - "gradeplugin.tag.vip"
      - "essentials.fly"
    price: 4.99
  legend:
    display-name: "Legende"
    prefix: "&6[LEGENDE] &f"
    suffix: ""
    color: "&6"
    priority: 5
    permissions:
      - "gradeplugin.tag.legend"
      - "essentials.fly"
      - "essentials.heal"
    price: null
