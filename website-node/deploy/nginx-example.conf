# Exemple de config nginx pour exposer le micro-service Node (website-node/)
# sous https://monsite.fr/boutique/, en même temps que ton site principal
# sur https://monsite.fr/ (server block existant pour index.html).
#
# A placer DANS le server{} existant de monsite.fr (celui qui sert deja
# ton site / ton backend actuel), pas dans un nouveau server{}.

location /boutique/ {
    # Le slash final ici ET dans proxy_pass est important : il fait que
    # nginx retire le prefixe "/boutique" avant de transmettre la requete
    # au service Node, qui lui ne connait que /shop, /admin, /webhook.
    proxy_pass http://127.0.0.1:3000/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Le webhook Stripe (/boutique/webhook/stripe) a besoin du corps brut
    # de la requete : ne pas le modifier/bufferiser en amont.
    proxy_set_header Content-Type $content_type;
    proxy_request_buffering off;
}
